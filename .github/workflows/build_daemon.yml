name: Build Daemon and Magisk Module

on:
  push:
    branches: [ main ]
    paths:
        - '.github/workflows/build_daemon.yml'
        - 'daemon/**'
        - 'magisk_module/**'
  pull_request:
    branches: [ main ]
    paths:
        - '.github/workflows/build_daemon.yml'
        - 'daemon/**'
        - 'magisk_module/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set NDK_DIR environment variable
        run: echo "NDK_DIR=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      - name: Configure CMake for Android
        run: |
          cmake -S . -B build_daemon_android \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_DIR/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-30 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build display_daemon
        run: cmake --build build_daemon_android --target display_daemon -j$(nproc)

      - name: Copy daemon to magisk_module directory
        run: |
          cp build_daemon_android/display_daemon magisk_module/
          chmod 755 magisk_module/display_daemon

      - name: Upload Magisk module
        uses: actions/upload-artifact@v7
        with:
          name: anland-daemon
          path: magisk_module/
